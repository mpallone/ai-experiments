<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e1e24">
<title>Tiny Coaster Tycoon</title>
<style>
  :root {
    --bg: #1e1e24;
    --panel: #2a2a33;
    --panel-hi: #3a3a46;
    --accent: #f5c242;
    --text: #f0f0f0;
    --grass: #4a8f3e;
    --path: #c9b07a;
    --coaster: #b03030;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    width: 100%;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--panel);
    flex: 0 0 auto;
    gap: 8px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    letter-spacing: 0.5px;
  }
  .hud {
    display: flex;
    gap: 14px;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  .hud span b { color: var(--accent); }
  main {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 8px;
  }
  canvas {
    background: var(--grass);
    display: block;
    touch-action: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    max-width: 100%;
    max-height: 100%;
  }
  footer {
    display: flex;
    gap: 8px;
    padding: 8px;
    background: var(--panel);
    flex: 0 0 auto;
    justify-content: center;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
  }
  button.tool {
    flex: 1 1 0;
    max-width: 140px;
    min-height: 52px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: var(--panel-hi);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    transition: border-color 120ms, background 120ms;
  }
  button.tool small { font-weight: 400; font-size: 11px; opacity: 0.7; margin-top: 2px; }
  button.tool.active { border-color: var(--accent); background: #45453a; }
  button.tool:active { transform: scale(0.97); }
  button.tool:disabled { opacity: 0.4; cursor: default; }
  #loading, #error {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    font-size: 16px;
    z-index: 10;
    padding: 24px;
    text-align: center;
  }
  #error { color: #ff8a8a; display: none; }
</style>
</head>
<body>
<div id="loading">loading…</div>
<div id="error"></div>
<div id="app" style="display:none;">
  <header>
    <h1>Tiny Coaster Tycoon</h1>
    <div class="hud">
      <span>$<b id="money">0</b></span>
      <span><b id="guests">0</b> guests</span>
    </div>
  </header>
  <main>
    <canvas id="game"></canvas>
  </main>
  <footer>
    <button class="tool active" data-tool="0">Path<small>$1</small></button>
    <button class="tool" data-tool="1">Coaster<small>$50</small></button>
    <button class="tool" data-tool="2">Bulldoze<small>free</small></button>
  </footer>
</div>

<script type="module">
const WASM_B64 = "AGFzbQEAAAABKQhgA39/fwBgAn9/AGADf39/AX9gAAF/YAF/AX9gAn9/AX9gAX8AYAAAAxAPAAECAwMEAwMFAwYDBgMHBQMBABEGGQN/AUGAgMAAC38AQZSNwAALfwBBoI3AAAsHqAEPBm1lbW9yeQIABWNsaWNrAAIKZW50cmFuY2VfeAADCmVudHJhbmNlX3kABAlnZXRfZ3Vlc3QABQ9nZXRfZ3Vlc3RfY291bnQABglnZXRfbW9uZXkABwhnZXRfdGlsZQAIBmhlaWdodAAJBGluaXQACgptYXhfZ3Vlc3RzAAsEdGljawAMBXdpZHRoAA0KX19kYXRhX2VuZAMBC19faGVhcF9iYXNlAwIKxBQPqgUBDH8jgICAgABBgAxrIgMkgICAgAACQAJAIAFB//8DcSACQf//A3FHDQBBACEEDAELAkBB1gRFDQAgA0EGakEAQdYE/AsACwJAQdgERQ0AIANB3ARqQf8BQdgE/AsACwJAQawCRQ0AIANBtAlqQQBBrAL8CwALIAMgATsBBAJAAkAgAUH//wNxIgVBqwJLDQAgA0G0CWogBWpBAToAAEEAIQQgAkH//wNxIQZBASEHQQAhCANAAkAgCCAHSQ0ADAQLAkACQCAIQawCRg0AIANBBGogCEEBdGovAQAiCSAGRw0BA0AgAiIKQf//A3EiBUGrAksNBUEAIQQgA0HcBGogBUEBdGouAQAiAkEASA0GIAJB//8DcSABQf//A3FHDQALQQEhBAwFC0GsAkGsAhCBgICAAAALIAhBAWohCCADQoCAgIBwNwL4CyADQoCAgIAQNwLwCyADQv////8PNwLoCyADQgE3AuALIAdBrAIgB0GsAksbIQsgCUEUbiIMQWxsIAlqQf//A3EhDUEAIQUDQCAFQSBGDQECQAJAAkACQCADQeALaiAFaiIOQQRqKAIAIAxqIgpBDkoNACAOKAIAIA1qIg5BE0oNACAKIA5yQQBIDQAgA0G0CWogCkEUbCAOaiIKaiIOLQAADQAgCkGMAUYNAiAKLQDYisCAAEF/akH/AXFBAkkNAQsgBUEIaiEFDAMLIAVBCGohBQwBCyAFQQhqIQVBjAEhCgsgDkEBOgAAIANB3ARqIApBAXRqIAk7AQACQCAHIAtGDQAgA0EEaiAHQQF0aiAKOwEAIAdBAWohBwwBCwsLIAtBrAIQgYCAgAAACyAFQawCEIGAgIAAAAsgBUGsAhCBgICAAAALIAAgCjsBAiAAIAQ7AQAgA0GADGokgICAgAALCQAQjoCAgAAAC9kGAQd/I4CAgIAAQbAHayIDJICAgIAAQQAhBAJAIABBE0sNACABQQ5LDQAgAUEUbCAAaiIFQYwBRg0AAkACQAJAAkAgAg4DAAECBAsgBS0A2IrAgAANA0EAIQRBACgChI3AgAAiAEEBSA0DQQAgAEF/ajYChI3AgAAgBUHYisCAAGpBAToAAAwCC0HYCiEAA0ACQCAAQYQNRw0AIAUtANiKwIAADQRBACEEQQAoAoSNwIAAIgBBMkgNBEEAIABBTmo2AoSNwIAAIAVB2IrAgABqQQI6AAAMAwsgAEGAgMCAAGohASAAQQFqIQAgAS0AAEECRg0DDAALCyAFLQDYisCAAEUNASAFQdiKwIAAakEAOgAACwJAQdYERQ0AIANBDmpBAEHWBPwLAAsCQEGsAkUNACADQeQEakEAQawC/AsAC0GABiEAA0ACQCAAQdgKRw0AQQBB//8DOwGQjcCAACADQYwBOwEMIANBAToA8AVBASEGQQAhBwNAAkACQAJAAkACQCAHIAZPDQAgB0GsAkYNASADQQxqIAdBAXRqLwEAIghBrAJPDQIgCC0A2IrAgABBAkcNBEEALgGQjcCAAEEASA0DDAQLQQEhBAwHC0GsAkGsAhCBgICAAAALIAhBrAIQgYCAgAAAC0EAIAg7AZCNwIAACyAHQQFqIQcgA0KAgICAcD AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAZAAAAAAAAAABAAAA//8AAA==";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function main() {
  let instance;
  try {
    const bytes = b64ToBytes(WASM_B64);
    const mod = await WebAssembly.instantiate(bytes, {});
    instance = mod.instance;
  } catch (e) {
    const err = document.getElementById("error");
    err.style.display = "flex";
    err.textContent = "Failed to load wasm: " + e.message;
    return;
  }

  const ex = instance.exports;
  ex.init(Math.floor(Math.random() * 0xFFFFFFFF) || 1);

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";

  const W = ex.width();
  const H = ex.height();
  const MAX_GUESTS = ex.max_guests();
  const ENT_X = ex.entrance_x();
  const ENT_Y = ex.entrance_y();

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let tileSize = 32;
  let dpr = 1;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    const main = canvas.parentElement;
    const availW = main.clientWidth - 8;
    const availH = main.clientHeight - 8;
    // Largest integer tile size that fits both dimensions.
    const ts = Math.max(8, Math.floor(Math.min(availW / W, availH / H)));
    tileSize = ts;
    const cssW = ts * W;
    const cssH = ts * H;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  resize();

  // --- Tool selection ---
  let currentTool = 0;
  const toolButtons = document.querySelectorAll("button.tool");
  toolButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      currentTool = parseInt(btn.dataset.tool, 10);
      toolButtons.forEach(b => b.classList.toggle("active", b === btn));
    });
  });

  // --- Input: pointerdown + drag-to-paint ---
  let pointerDown = false;
  let lastTile = -1;

  function tileFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const tx = Math.floor(cx / tileSize);
    const ty = Math.floor(cy / tileSize);
    if (tx < 0 || ty < 0 || tx >= W || ty >= H) return null;
    return { tx, ty };
  }

  function place(tx, ty) {
    const key = ty * W + tx;
    if (key === lastTile) return;
    lastTile = key;
    ex.click(tx, ty, currentTool);
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    pointerDown = true;
    lastTile = -1;
    canvas.setPointerCapture(e.pointerId);
    const t = tileFromEvent(e);
    if (t) place(t.tx, t.ty);
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!pointerDown) return;
    const t = tileFromEvent(e);
    if (t) place(t.tx, t.ty);
  });
  const endPointer = (e) => {
    pointerDown = false;
    lastTile = -1;
  };
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);
  canvas.addEventListener("contextmenu", e => e.preventDefault());

  // --- Render loop ---
  const moneyEl = document.getElementById("money");
  const guestEl = document.getElementById("guests");

  const COLORS = ["#4a8f3e", "#c9b07a", "#b03030"];

  let lastFrame = performance.now();

  function frame(now) {
    const dt = Math.min(200, now - lastFrame);
    lastFrame = now;
    ex.tick(Math.round(dt));

    // Background grass already via canvas bg color; still, paint tiles.
    ctx.fillStyle = COLORS[0];
    ctx.fillRect(0, 0, W * tileSize, H * tileSize);

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const t = ex.get_tile(x, y);
        if (t === 0) continue;
        ctx.fillStyle = COLORS[t];
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        if (t === 2) {
          // Coaster: inner detail
          ctx.fillStyle = "#5a0a0a";
          const pad = Math.max(2, Math.floor(tileSize * 0.2));
          ctx.fillRect(x * tileSize + pad, y * tileSize + pad,
                       tileSize - pad * 2, tileSize - pad * 2);
        }
      }
    }

    // Grid lines (faint)
    ctx.strokeStyle = "rgba(0,0,0,0.12)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= W; x++) {
      ctx.moveTo(x * tileSize + 0.5, 0);
      ctx.lineTo(x * tileSize + 0.5, H * tileSize);
    }
    for (let y = 0; y <= H; y++) {
      ctx.moveTo(0, y * tileSize + 0.5);
      ctx.lineTo(W * tileSize, y * tileSize + 0.5);
    }
    ctx.stroke();

    // Entrance marker
    ctx.fillStyle = "#f5c242";
    const ex_px = ENT_X * tileSize;
    const ey_px = ENT_Y * tileSize;
    ctx.fillRect(ex_px, ey_px, Math.max(2, Math.floor(tileSize * 0.2)), tileSize);

    // Guests
    ctx.fillStyle = "#ffffff";
    const r = Math.max(2, Math.floor(tileSize * 0.18));
    for (let i = 0; i < MAX_GUESTS; i++) {
      const g = ex.get_guest(i);
      if (g === 0) continue;
      const state = g & 0xff;
      const gx = (g >> 8) & 0xff;
      const gy = (g >> 16) & 0xff;
      const cx = gx * tileSize + tileSize / 2;
      const cy = gy * tileSize + tileSize / 2;
      ctx.fillStyle = state === 2 ? "#ffe066" : "#ffffff";
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // HUD
    moneyEl.textContent = ex.get_money();
    guestEl.textContent = ex.get_guest_count();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

main();
</script>
</body>
</html>
