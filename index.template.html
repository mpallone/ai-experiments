<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e1e24">
<title>Tiny Coaster Tycoon</title>
<style>
  :root {
    --bg: #1e1e24;
    --panel: #2a2a33;
    --panel-hi: #3a3a46;
    --accent: #f5c242;
    --text: #f0f0f0;
    --grass: #4a8f3e;
    --path: #c9b07a;
    --coaster: #b03030;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    width: 100%;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--panel);
    flex: 0 0 auto;
    gap: 8px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    letter-spacing: 0.5px;
  }
  .hud {
    display: flex;
    gap: 14px;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  .hud span b { color: var(--accent); }
  main {
    flex: 1 1 auto;
    display: block;
    min-height: 0;
    position: relative;
  }
  canvas {
    display: block;
    touch-action: none;
    width: 100%;
    height: 100%;
  }
  footer {
    display: flex;
    gap: 8px;
    padding: 8px;
    background: var(--panel);
    flex: 0 0 auto;
    justify-content: center;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
  }
  button.tool {
    flex: 1 1 0;
    max-width: 140px;
    min-height: 52px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: var(--panel-hi);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
    transition: border-color 120ms, background 120ms;
  }
  button.tool small { font-weight: 400; font-size: 11px; opacity: 0.7; margin-top: 2px; }
  button.tool.active { border-color: var(--accent); background: #45453a; }
  button.tool:active { transform: scale(0.97); }
  button.tool:disabled { opacity: 0.4; cursor: default; }
  #loading, #error {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    font-size: 16px;
    z-index: 10;
    padding: 24px;
    text-align: center;
  }
  #error { color: #ff8a8a; display: none; }
</style>
</head>
<body>
<div id="loading">loading…</div>
<div id="error"></div>
<div id="app" style="display:none;">
  <header>
    <h1>Tiny Coaster Tycoon</h1>
    <div class="hud">
      <span>$<b id="money">0</b></span>
      <span><b id="guests">0</b> guests</span>
    </div>
  </header>
  <main>
    <canvas id="game"></canvas>
  </main>
  <footer>
    <button class="tool active" data-tool="0">Path<small>$1</small></button>
    <button class="tool" data-tool="1">Track<small>$10</small></button>
    <button class="tool" data-tool="5">Loop<small>$25</small></button>
    <button class="tool" data-tool="2">Bulldoze<small>free</small></button>
    <button class="tool" data-tool="3">Raise<small>$2</small></button>
    <button class="tool" data-tool="4">Lower<small>free</small></button>
  </footer>
</div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";

const WASM_B64 = "__WASM_BASE64__";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function main() {
  let instance;
  try {
    const bytes = b64ToBytes(WASM_B64);
    const mod = await WebAssembly.instantiate(bytes, {});
    instance = mod.instance;
  } catch (e) {
    const err = document.getElementById("error");
    err.style.display = "flex";
    err.textContent = "Failed to load wasm: " + e.message;
    return;
  }

  const ex = instance.exports;
  ex.init(Math.floor(Math.random() * 0xFFFFFFFF) || 1);

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "flex";

  const W = ex.width();
  const H = ex.height();
  const MAX_GUESTS = ex.max_guests();
  const ENT_X = ex.entrance_x();
  const ENT_Y = ex.entrance_y();

  const SHIRT_COLORS = [
    0xe23b3b, 0x3b82e2, 0x2ea84a, 0xa64ad4,
    0xff9f40, 0xe84a9a, 0x14b8a6, 0xeab308,
  ];
  const SKIN_COLOR = 0xf3c9a0;
  const LEG_COLOR = 0x2b2b2b;
  const RIDING_SHIRT = 0xffe066;
  const GRASS_COLOR = 0x4a8f3e;
  const PATH_COLOR = 0xc9b07a;
  const COASTER_COLOR = 0xb03030;
  const ENTRANCE_COLOR = 0xf5c242;
  const HEIGHT_UNIT = 0.4;

  const canvas = document.getElementById("game");
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio || 1);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87b7d9);

  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
  // Look at the center of the board from above-behind.
  const boardCenter = new THREE.Vector3(W / 2, 0, H / 2);
  camera.position.set(W / 2, Math.max(W, H) * 0.9, H + 8);
  camera.lookAt(boardCenter);

  // Lights.
  const hemi = new THREE.HemisphereLight(0xbfe0ff, 0x3a5a2a, 0.9);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(W, 20, -4);
  scene.add(sun);

  // Ground plane (grass).
  const groundGeo = new THREE.PlaneGeometry(W, H);
  const groundMat = new THREE.MeshStandardMaterial({ color: GRASS_COLOR });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(W / 2, 0, H / 2);
  scene.add(ground);

  // Faint grid lines.
  const grid = new THREE.GridHelper(Math.max(W, H), Math.max(W, H), 0x000000, 0x000000);
  grid.material.opacity = 0.12;
  grid.material.transparent = true;
  grid.position.set(Math.max(W, H) / 2, 0.002, Math.max(W, H) / 2);
  scene.add(grid);

  // Entrance marker: yellow pillar at the entrance tile.
  const entranceGeo = new THREE.BoxGeometry(0.2, 0.5, 1);
  const entranceMat = new THREE.MeshStandardMaterial({ color: ENTRANCE_COLOR });
  const entrance = new THREE.Mesh(entranceGeo, entranceMat);
  entrance.position.set(ENT_X + 0.1, 0.25, ENT_Y + 0.5);
  scene.add(entrance);

  // Tile mesh cache: key = y*W + x, value = { type, mesh }.
  const tileGroup = new THREE.Group();
  scene.add(tileGroup);

  const pathGeo = new THREE.BoxGeometry(1, 0.1, 1);
  const pathMat = new THREE.MeshStandardMaterial({ color: PATH_COLOR });
  const trackGeo = new THREE.BoxGeometry(1, 0.15, 1);
  const trackMat = new THREE.MeshStandardMaterial({ color: COASTER_COLOR });

  const LOOP_RADIUS = 0.45;
  const LOOP_TUBE = 0.04;
  const LOOP_ANIM_MS = 600;
  const loopGeo = new THREE.TorusGeometry(LOOP_RADIUS, LOOP_TUBE, 8, 24);
  const loopMat = new THREE.MeshStandardMaterial({ color: COASTER_COLOR });

  function loopAxisEW(x, y) {
    const isTrackish = (nx, ny) => {
      if (nx < 0 || ny < 0 || nx >= W || ny >= H) return false;
      const t = ex.get_tile(nx, ny);
      return t === 2 || t === 3;
    };
    const horiz = isTrackish(x - 1, y) || isTrackish(x + 1, y);
    const vert  = isTrackish(x, y - 1) || isTrackish(x, y + 1);
    return horiz || !vert;
  }

  const tileCache = new Map();

  function buildTileMesh(type, x, y, height, axisEW) {
    if (type === 1) {
      const m = new THREE.Mesh(pathGeo, pathMat);
      m.position.set(x + 0.5, 0.05, y + 0.5);
      return m;
    }
    if (type === 2) {
      const m = new THREE.Mesh(trackGeo, trackMat);
      m.position.set(x + 0.5, 0.075 + height * HEIGHT_UNIT, y + 0.5);
      return m;
    }
    if (type === 3) {
      const group = new THREE.Group();
      const pad = new THREE.Mesh(trackGeo, trackMat);
      pad.position.set(x + 0.5, 0.075 + height * HEIGHT_UNIT, y + 0.5);
      group.add(pad);
      const torus = new THREE.Mesh(loopGeo, loopMat);
      const cy = 0.15 + height * HEIGHT_UNIT + LOOP_RADIUS;
      torus.position.set(x + 0.5, cy, y + 0.5);
      // Default TorusGeometry ring plane is world XY (normal = Z) — correct
      // for east-west travel. Rotate PI/2 around Y for north-south travel so
      // the ring plane becomes world YZ.
      if (!axisEW) torus.rotation.y = Math.PI / 2;
      group.add(torus);
      return group;
    }
    return null;
  }

  function syncTiles() {
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const key = y * W + x;
        const t = ex.get_tile(x, y);
        const h = (t === 2 || t === 3) ? ex.get_height(x, y) : 0;
        const axisEW = t === 3 ? loopAxisEW(x, y) : false;
        const cached = tileCache.get(key);
        if (cached && cached.type === t && cached.height === h && cached.axisEW === axisEW) continue;
        if (cached) {
          tileGroup.remove(cached.mesh);
          tileCache.delete(key);
        }
        if (t !== 0) {
          const mesh = buildTileMesh(t, x, y, h, axisEW);
          tileGroup.add(mesh);
          tileCache.set(key, { type: t, height: h, axisEW, mesh });
        }
      }
    }
  }

  // Guest pool: one Group per potential guest, reused across frames.
  const guestPool = [];
  const bodyGeo = new THREE.BoxGeometry(0.32, 0.28, 0.2);
  const headGeo = new THREE.SphereGeometry(0.11, 10, 8);
  const legGeo = new THREE.BoxGeometry(0.12, 0.18, 0.12);
  const skinMat = new THREE.MeshStandardMaterial({ color: SKIN_COLOR });
  const legMat = new THREE.MeshStandardMaterial({ color: LEG_COLOR });

  for (let i = 0; i < MAX_GUESTS; i++) {
    const g = new THREE.Group();
    const shirtMat = new THREE.MeshStandardMaterial({
      color: SHIRT_COLORS[i % SHIRT_COLORS.length],
    });
    const body = new THREE.Mesh(bodyGeo, shirtMat);
    body.position.y = 0.28;
    g.add(body);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.y = 0.53;
    g.add(head);
    const lLeg = new THREE.Mesh(legGeo, legMat);
    lLeg.position.set(-0.08, 0.09, 0);
    g.add(lLeg);
    const rLeg = new THREE.Mesh(legGeo, legMat);
    rLeg.position.set(0.08, 0.09, 0);
    g.add(rLeg);
    g.visible = false;
    g.userData = { shirtMat, baseColor: SHIRT_COLORS[i % SHIRT_COLORS.length] };
    scene.add(g);
    guestPool.push(g);
  }

  // --- Resize ---
  function resize() {
    const parent = canvas.parentElement;
    const w = parent.clientWidth;
    const h = parent.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / Math.max(1, h);
    camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", resize);
  resize();

  // --- Tool selection ---
  let currentTool = 0;
  const toolButtons = document.querySelectorAll("button.tool");
  toolButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      currentTool = parseInt(btn.dataset.tool, 10);
      toolButtons.forEach(b => b.classList.toggle("active", b === btn));
    });
  });

  // --- Input: raycast against ground plane ---
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  // Invisible pick-plane matching the ground.
  const pickPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(W, H),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  pickPlane.rotation.x = -Math.PI / 2;
  pickPlane.position.set(W / 2, 0, H / 2);
  scene.add(pickPlane);

  let pointerDown = false;
  let lastTile = -1;

  function tileFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObject(pickPlane);
    if (hits.length === 0) return null;
    const p = hits[0].point;
    const tx = Math.floor(p.x);
    const ty = Math.floor(p.z);
    if (tx < 0 || ty < 0 || tx >= W || ty >= H) return null;
    return { tx, ty };
  }

  function place(tx, ty) {
    const key = ty * W + tx;
    if (key === lastTile) return;
    lastTile = key;
    ex.click(tx, ty, currentTool);
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    pointerDown = true;
    lastTile = -1;
    canvas.setPointerCapture(e.pointerId);
    const t = tileFromEvent(e);
    if (t) place(t.tx, t.ty);
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!pointerDown) return;
    const t = tileFromEvent(e);
    if (t) place(t.tx, t.ty);
  });
  const endPointer = (e) => {
    pointerDown = false;
    lastTile = -1;
  };
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);
  canvas.addEventListener("contextmenu", e => e.preventDefault());

  // --- Render loop ---
  const moneyEl = document.getElementById("money");
  const guestEl = document.getElementById("guests");

  let lastFrame = performance.now();

  const guestLoopState = new Array(MAX_GUESTS).fill(null);

  function frame(now) {
    const dt = Math.min(200, now - lastFrame);
    lastFrame = now;
    ex.tick(Math.round(dt));

    syncTiles();

    // Guests.
    for (let i = 0; i < MAX_GUESTS; i++) {
      const packed = ex.get_guest(i);
      const g = guestPool[i];
      if (packed === 0) {
        g.visible = false;
        guestLoopState[i] = null;
        continue;
      }
      const state = packed & 0xff;
      const gx = (packed >> 8) & 0xff;
      const gy = (packed >> 16) & 0xff;
      g.visible = true;

      const tileType = state === 2 ? ex.get_tile(gx, gy) : 0;
      if (state === 2 && tileType === 3) {
        const tileKey = gy * W + gx;
        let ls = guestLoopState[i];
        if (!ls || ls.tileKey !== tileKey) {
          const h = ex.get_height(gx, gy);
          ls = {
            tileKey,
            startMs: now,
            axisEW: loopAxisEW(gx, gy),
            cx: gx + 0.5,
            cy: 0.15 + h * HEIGHT_UNIT + LOOP_RADIUS,
            cz: gy + 0.5,
          };
          guestLoopState[i] = ls;
        }
        const phase = Math.min(1, (now - ls.startMs) / LOOP_ANIM_MS);
        const theta = -Math.PI / 2 + phase * Math.PI * 2;
        const along = Math.cos(theta) * LOOP_RADIUS;
        const up    = Math.sin(theta) * LOOP_RADIUS;
        if (ls.axisEW) {
          g.position.set(ls.cx + along, ls.cy + up, ls.cz);
          g.rotation.set(0, 0, theta + Math.PI / 2);
        } else {
          g.position.set(ls.cx, ls.cy + up, ls.cz + along);
          g.rotation.set(-(theta + Math.PI / 2), 0, 0);
        }
      } else {
        guestLoopState[i] = null;
        const yOffset = state === 2
          ? 0.15 + ex.get_height(gx, gy) * HEIGHT_UNIT
          : 0;
        g.position.set(gx + 0.5, yOffset, gy + 0.5);
        g.rotation.set(0, 0, 0);
      }

      const target = state === 2 ? RIDING_SHIRT : g.userData.baseColor;
      if (g.userData.shirtMat.color.getHex() !== target) {
        g.userData.shirtMat.color.setHex(target);
      }
    }

    renderer.render(scene, camera);

    moneyEl.textContent = ex.get_money();
    guestEl.textContent = ex.get_guest_count();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

main();
</script>
</body>
</html>
